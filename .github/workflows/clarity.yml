name: Clarity CI
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Clarinet
        run: |
          wget -q https://github.com/hirosystems/clarinet/releases/download/v3.16.0/clarinet-linux-x64.tar.gz -O clarinet.tar.gz
          tar -xzf clarinet.tar.gz
          sudo mv clarinet /usr/local/bin/
          clarinet --version
      - name: Clarinet Check
        run: |
          cd stacks-contracts
          clarinet check
